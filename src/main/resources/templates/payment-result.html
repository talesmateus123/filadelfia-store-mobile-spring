<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado do Pagamento - Filadelfia Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .payment-result {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
        }
        
        .success-icon {
            color: #28a745;
            font-size: 4rem;
        }
        
        .error-icon {
            color: #dc3545;
            font-size: 4rem;
        }
        
        .payment-details {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="payment-result text-center">
            <div th:if="${success}">
                <i class="fas fa-check-circle success-icon mb-3"></i>
                <h1 class="text-success">Pagamento Aprovado!</h1>
                <p class="lead" th:text="${message}">Seu pagamento foi processado com sucesso.</p>
                
                <div class="payment-details text-start" th:if="${payment}">
                    <h4 class="mb-3">Detalhes do Pagamento</h4>
                    <div class="row">
                        <div class="col-sm-4"><strong>ID da Transação:</strong></div>
                        <div class="col-sm-8" th:text="${payment.transactionId}"></div>
                    </div>
                    <div class="row mt-2">
                        <div class="col-sm-4"><strong>Valor:</strong></div>
                        <div class="col-sm-8">
                            <span th:text="${payment.currency}">BRL</span>
                            <span th:text="${#numbers.formatDecimal(payment.amount, 0, 2)}">0.00</span>
                        </div>
                    </div>
                    <div class="row mt-2">
                        <div class="col-sm-4"><strong>Método:</strong></div>
                        <div class="col-sm-8" th:text="${payment.paymentMethod.displayName}"></div>
                    </div>
                    <div class="row mt-2">
                        <div class="col-sm-4"><strong>Status:</strong></div>
                        <div class="col-sm-8">
                            <span class="badge bg-success" th:text="${payment.status.displayName}"></span>
                        </div>
                    </div>
                </div>
                
                <div class="mt-4">
                    <a href="/orders/my" class="btn btn-primary me-2">
                        <i class="fas fa-list-alt"></i> Ver Meus Pedidos
                    </a>
                    <a href="/" class="btn btn-outline-secondary">
                        <i class="fas fa-home"></i> Voltar à Loja
                    </a>
                </div>
            </div>
            
            <div th:unless="${success}">
                <i class="fas fa-times-circle error-icon mb-3"></i>
                <h1 class="text-danger">Pagamento Não Realizado</h1>
                <p class="lead" th:text="${message}">Ocorreu um problema com seu pagamento.</p>
                
                <div class="payment-details text-start" th:if="${payment}">
                    <h4 class="mb-3">Detalhes</h4>
                    <div class="row">
                        <div class="col-sm-4"><strong>ID da Transação:</strong></div>
                        <div class="col-sm-8" th:text="${payment.transactionId}"></div>
                    </div>
                    <div class="row mt-2">
                        <div class="col-sm-4"><strong>Status:</strong></div>
                        <div class="col-sm-8">
                            <span class="badge bg-danger" th:text="${payment.status.displayName}"></span>
                        </div>
                    </div>
                </div>
                
                <div class="mt-4">
                    <a href="/checkout" class="btn btn-primary me-2" th:if="${order}">
                        <i class="fas fa-credit-card"></i> Tentar Novamente
                    </a>
                    <a href="/" class="btn btn-outline-secondary">
                        <i class="fas fa-home"></i> Voltar à Loja
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
