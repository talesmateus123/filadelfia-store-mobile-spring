name: 🚀 Deploy Filadelfia Store to VPS

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write
  actions: read

env:
  JAVA_VERSION: '21'
  APPLICATION_NAME: filadelfiastore

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: ☕ Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        cache: maven
    
    - name: 🧪 Run tests
      run: ./mvnw test --batch-mode --fail-at-end
    
    - name: 📊 Test Results Summary
      if: always()
      run: |
        if [ -f target/surefire-reports/TEST-*.xml ]; then
          echo "✅ Tests completed. Check detailed results in Job Summary."
          find target/surefire-reports -name '*.xml' -exec basename {} \; | head -5
        else
          echo "No test results found."
        fi

  build-and-deploy:
    name: 🏗️ Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: ☕ Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        cache: maven
    
    - name: 🏗️ Build application
      run: |
        ./mvnw clean package -DskipTests --batch-mode
        echo "JAR_FILE=$(find target -name '*.jar' -not -name '*sources.jar' -not -name '*javadoc.jar' | head -1)" >> $GITHUB_ENV
    
    - name: 📦 Upload artifact info
      run: |
        echo "Built JAR: $JAR_FILE"
        ls -la target/*.jar
    
    - name: 🔍 Verify secrets
      run: |
        echo "🔍 Verificando configuração dos secrets..."
        echo "VPS_HOST: ${{ secrets.FILADELFIA_VPS_HOST != '' && 'configurado' || 'NÃO CONFIGURADO' }}"
        echo "VPS_USER: ${{ secrets.FILADELFIA_VPS_USER != '' && 'configurado' || 'NÃO CONFIGURADO' }}"
        echo "VPS_PORT: ${{ secrets.FILADELFIA_VPS_PORT != '' && 'configurado' || 'NÃO CONFIGURADO (padrão: 22)' }}"
        echo "VPS_SSH_KEY: ${{ secrets.FILADELFIA_VPS_SSH_KEY != '' && 'configurado' || 'NÃO CONFIGURADO' }}"
        
        # Mostrar valores mascarados para debug (não mostra valores reais)
        if [ -n "${{ secrets.FILADELFIA_VPS_HOST }}" ]; then
          HOST="${{ secrets.FILADELFIA_VPS_HOST }}"
          echo "Host (primeiros 3 dígitos): ${HOST:0:3}***"
        fi
        
        if [ -n "${{ secrets.FILADELFIA_VPS_SSH_KEY }}" ]; then
          KEY="${{ secrets.FILADELFIA_VPS_SSH_KEY }}"
          echo "SSH Key (início): ${KEY:0:20}..."
          if [[ $KEY == *"BEGIN"* ]]; then
            echo "✅ SSH Key parece válida (contém BEGIN)"
          else
            echo "❌ SSH Key pode estar malformada (não contém BEGIN)"
          fi
        fi
    
    - name: 🔐 Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.FILADELFIA_VPS_SSH_KEY }}" > ~/.ssh/filadelfia_key
        chmod 600 ~/.ssh/filadelfia_key
        
        echo "🔍 Testando conectividade de rede..."
        echo "Host: ${{ secrets.FILADELFIA_VPS_HOST }}"
        echo "Port: ${{ secrets.FILADELFIA_VPS_PORT || '22' }}"
        echo "User: ${{ secrets.FILADELFIA_VPS_USER }}"
        
        # Teste básico de conectividade TCP
        timeout 10 nc -zv ${{ secrets.FILADELFIA_VPS_HOST }} ${{ secrets.FILADELFIA_VPS_PORT || '22' }} || {
          echo "❌ ERRO: Não é possível conectar no servidor!"
          echo "Possíveis causas:"
          echo "1. IP incorreto no secret FILADELFIA_VPS_HOST"
          echo "2. Porta incorreta no secret FILADELFIA_VPS_PORT" 
          echo "3. Servidor desligado/inacessível"
          echo "4. Firewall bloqueando GitHub Actions"
          echo "5. Provedor VPS bloqueando conexões externas"
          echo ""
          echo "🛠️ Soluções:"
          echo "- Verifique se o servidor está ligado e acessível"
          echo "- Teste SSH do seu computador: ssh ${{ secrets.FILADELFIA_VPS_USER }}@${{ secrets.FILADELFIA_VPS_HOST }}"
          echo "- Configure firewall para aceitar conexões na porta SSH"
          echo "- Entre em contato com provedor VPS sobre whitelist de IPs"
          exit 1
        }
        
        echo "✅ Conectividade TCP OK. Testando SSH..."
        
        # Adicionar host às known_hosts
        ssh-keyscan -p ${{ secrets.FILADELFIA_VPS_PORT || '22' }} -H ${{ secrets.FILADELFIA_VPS_HOST }} >> ~/.ssh/known_hosts || true
        
        # Teste de conectividade SSH
        ssh -i ~/.ssh/filadelfia_key -p ${{ secrets.FILADELFIA_VPS_PORT || '22' }} -o ConnectTimeout=10 -o StrictHostKeyChecking=no ${{ secrets.FILADELFIA_VPS_USER }}@${{ secrets.FILADELFIA_VPS_HOST }} "echo 'SSH connection successful'" || {
          echo "❌ SSH connection failed após conectividade OK"
          echo "Problemas de autenticação SSH:"
          echo "1. Usuário '${{ secrets.FILADELFIA_VPS_USER }}' não existe no servidor"
          echo "2. Chave pública não está em ~/.ssh/authorized_keys"
          echo "3. Chave privada incorreta no secret FILADELFIA_VPS_SSH_KEY"
          echo "4. Permissões incorretas no servidor"
          exit 1
        }

    - name: 🚀 Deploy to VPS
      env:
        VPS_HOST: ${{ secrets.FILADELFIA_VPS_HOST }}
        VPS_USER: ${{ secrets.FILADELFIA_VPS_USER }}
        VPS_PORT: ${{ secrets.FILADELFIA_VPS_PORT }}
        DATABASE_URL: jdbc:mysql://localhost:3306/filadelfia_prod
      run: |
        # Transferir JAR para o servidor
        scp -i ~/.ssh/filadelfia_key -P ${VPS_PORT:-22} -o StrictHostKeyChecking=no $JAR_FILE $VPS_USER@$VPS_HOST:/tmp/filadelfiastore.jar
        
        # Executar deployment no servidor
        ssh -i ~/.ssh/filadelfia_key -p ${VPS_PORT:-22} -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST << 'ENDSSH'
          set -e
          
          echo "🚀 Iniciando deployment do Filadelfia Store..."
          
          # Definir variáveis
          APP_DIR="/var/www/filadelfiastore"
          BACKUP_DIR="/var/www/backups/filadelfiastore"
          SERVICE_NAME="filadelfiastore"
          
          # Criar backup da versão atual se existir
          if [ -f "$APP_DIR/filadelfiastore.jar" ]; then
            echo "📦 Criando backup da versão atual..."
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            cp "$APP_DIR/filadelfiastore.jar" "$BACKUP_DIR/filadelfiastore_backup_$TIMESTAMP.jar"
            
            # Manter apenas os últimos 5 backups
            ls -t "$BACKUP_DIR"/filadelfiastore_backup_*.jar | tail -n +6 | xargs -r rm
          fi
          
          # Parar o serviço
          echo "⏹️ Parando serviço $SERVICE_NAME..."
          sudo systemctl stop $SERVICE_NAME || true
          
          # Mover novo JAR
          echo "📁 Instalando nova versão..."
          mv /tmp/filadelfiastore.jar "$APP_DIR/filadelfiastore.jar"
          
          # Configurar permissões
          chown filadelfia:filadelfia "$APP_DIR/filadelfiastore.jar"
          chmod 755 "$APP_DIR/filadelfiastore.jar"
          
          # Configurar variáveis de ambiente
          echo "⚙️ Configurando variáveis de ambiente..."
          sudo tee /etc/systemd/system/filadelfiastore.env > /dev/null << EOF
        DATABASE_URL=jdbc:mysql://localhost:3306/filadelfia_prod
        DATABASE_USERNAME=filadelfia_prod_user
        DATABASE_DRIVER=com.mysql.cj.jdbc.Driver
        DDL_AUTO=update
        DATABASE_PLATFORM=org.hibernate.dialect.MySQLDialect
        SPRING_PROFILES_ACTIVE=production
        SERVER_PORT=8081
        EOF
          
          # Recarregar systemd e iniciar serviço
          echo "🔄 Recarregando systemd..."
          sudo systemctl daemon-reload
          
          echo "🚀 Iniciando serviço $SERVICE_NAME..."
          sudo systemctl start $SERVICE_NAME
          sudo systemctl enable $SERVICE_NAME
          
          # Aguardar inicialização
          echo "⏳ Aguardando inicialização..."
          sleep 10
          
          # Verificar status do serviço
          if sudo systemctl is-active --quiet $SERVICE_NAME; then
            echo "✅ Serviço está ativo!"
            
            # Teste de conectividade
            if curl -f -s http://localhost:8081/actuator/health > /dev/null 2>&1; then
              echo "✅ Health check passou!"
            else
              echo "⚠️ Health check falhou, mas serviço está rodando"
            fi
            
            # Status final
            sudo systemctl status $SERVICE_NAME --no-pager -l
            
          else
            echo "❌ Falha ao iniciar o serviço!"
            echo "📋 Logs do serviço:"
            sudo journalctl -u $SERVICE_NAME --no-pager -l --since "5 minutes ago"
            exit 1
          fi
          
          echo "🎉 Deploy concluído com sucesso!"
        ENDSSH
    
    - name: 🎯 Deployment Summary
      if: always()
      run: |
        echo "## 📊 Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Application**: ${{ env.APPLICATION_NAME }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **JAR File**: \`$(basename $JAR_FILE)\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Java Version**: ${{ env.JAVA_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Target Server**: ${{ secrets.FILADELFIA_VPS_HOST }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ **Status**: Deployment successful!" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **URL**: http://${{ secrets.FILADELFIA_VPS_HOST }}" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Status**: Deployment failed!" >> $GITHUB_STEP_SUMMARY
        fi